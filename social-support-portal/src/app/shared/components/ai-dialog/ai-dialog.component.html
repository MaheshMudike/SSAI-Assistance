<div class="ai-dialog-container">

    <mat-card class="ai-card">

        <div class="dialog-header">
            <h2>AI Generated Suggestion</h2>
            <p>
                Review, edit, or accept the generated content.
            </p>
        </div>

        <mat-form-field appearance="outline" class="full-width">

            <textarea matInput [(ngModel)]="text" rows="10">
 </textarea>

        </mat-form-field>

        <div class="button-row">

            <button mat-stroked-button (click)="discard()">

                Discard
            </button>

            <button mat-raised-button color="primary" (click)="accept()">

                Accept
            </button>

        </div>

    </mat-card>

</div>
